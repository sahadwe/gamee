<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEVIL RUN — 100 Levels</title>
<style>
  :root{
    --bg1:#0b0014;
    --bg2:#1a0330;
    --accent:#ff2e63;
    --accent2:#08d9d6;
    --gold:#ffd93d;
    --ink:#f5f5f5;
    --panel:#150022cc;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; height:100dvh; overflow:hidden;
    background: linear-gradient(180deg,#87CEEB 0%, #b3e5fc 100%);
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    color:var(--ink);
  }
  #gameWrap{
    position:relative; width:100vw; height:100vh; height:100dvh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas{
    background: linear-gradient(180deg,#5EC8F2 0%, #B8E6FB 65%, #DFF4FD 100%);
    display:block;
    box-shadow: 0 0 60px #000a, inset 0 0 120px #00000088;
    touch-action:none;
    max-width:100vw; max-height:100vh;
  }
  #hud{
    position:absolute; top:10px; left:10px; right:10px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:5;
    font-size:14px;
  }
  .hud-box{
    background:var(--panel); border:1px solid #ffffff22; border-radius:10px;
    padding:6px 14px; backdrop-filter:blur(4px);
    box-shadow:0 2px 10px #0006;
  }
  #levelLabel{font-weight:bold; letter-spacing:1px; color:var(--gold); text-shadow:0 0 8px #ffd93d55;}
  #deathCount{color:var(--accent2);}
  #msgOverlay{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:#000000cc; z-index:20; gap:16px; padding:20px;
  }
  #msgOverlay.hidden{display:none;}
  #msgOverlay h1{
    font-size:clamp(28px,7vw,54px); margin:0;
    color:var(--accent); text-shadow:0 0 20px var(--accent), 0 0 40px #ff2e6355;
    letter-spacing:2px;
  }
  #msgOverlay p{ font-size:clamp(14px,3vw,18px); color:#ddd; max-width:420px; margin:0;}
  .btn{
    font-family:inherit; font-weight:bold; font-size:16px; letter-spacing:1px;
    padding:12px 30px; border-radius:30px; border:none; cursor:pointer;
    background: linear-gradient(135deg, var(--accent), #a4004f);
    color:white; box-shadow:0 4px 0 #6b0033, 0 6px 14px #0008;
    transition: transform .06s;
  }
  .btn:active{ transform:translateY(4px); box-shadow:0 0 0 #6b0033;}
  .btn.alt{ background:linear-gradient(135deg, var(--accent2), #036b69); box-shadow:0 4px 0 #024b49, 0 6px 14px #0008;}
  #controls{
    position:absolute; bottom:calc(28px + env(safe-area-inset-bottom, 0px)); left:0; right:0;
    display:flex; justify-content:space-between; padding:0 16px;
    z-index:10; pointer-events:none;
  }
  #controls .side{ display:flex; gap:10px; pointer-events:auto; }
  .padBtn{
    width:64px; height:64px; border-radius:50%;
    background:#ffffff14; border:2px solid #ffffff33; color:#fff;
    font-size:26px; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px); box-shadow:0 4px 10px #0006;
  }
  .padBtn:active{ background:#ffffff33; }
  #jumpBtn{
    width:78px; height:78px; border-radius:50%;
    background:linear-gradient(135deg,var(--gold),#c99700);
    border:2px solid #ffffff55; color:#3a2600; font-size:15px; font-weight:bold;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 5px 0 #8a6c00, 0 8px 16px #0007;
  }
  #jumpBtn:active{ transform:translateY(4px); box-shadow:0 1px 0 #8a6c00; }
  #topBtns{position:absolute; top:10px; right:10px; z-index:6; display:flex; gap:6px;}
  .iconBtn{
    background:var(--panel); border:1px solid #ffffff22; color:#fff; border-radius:8px;
    width:34px; height:34px; font-size:16px; cursor:pointer;
  }
  #tip{
    position:absolute; bottom:110px; left:0; right:0; text-align:center;
    color:#ffffffaa; font-size:12px; z-index:4; pointer-events:none;
    text-shadow:0 1px 3px #000;
  }
  @media (min-width: 900px){
    #controls{ display:none; }
  }
  @media (max-width: 420px), (max-height: 700px){
    .padBtn{ width:56px; height:56px; font-size:22px; }
    #jumpBtn{ width:68px; height:68px; font-size:13px; }
    #controls{ bottom:calc(20px + env(safe-area-inset-bottom, 0px)); }
    #tip{ display:none; }
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="c" width="960" height="540"></canvas>
  <div id="hud">
    <div class="hud-box" id="levelLabel">LEVEL 1 / 100</div>
    <div class="hud-box" id="deathCount">💀 0</div>
  </div>
  <div id="topBtns">
    <button class="iconBtn" id="restartBtn" title="Restart level">⟲</button>
    <button class="iconBtn" id="muteBtn" title="Mute">🔊</button>
  </div>
  <div id="tip">Arrow keys / A D to move • Space / ↑ to jump • Tap-hold red buttons on mobile</div>
  <div id="controls">
    <div class="side">
      <button class="padBtn" id="leftBtn">◀</button>
      <button class="padBtn" id="rightBtn">▶</button>
    </div>
    <div class="side">
      <button id="jumpBtn">JUMP</button>
    </div>
  </div>
  <div id="msgOverlay">
    <h1 id="msgTitle">DEVIL RUN</h1>
    <p id="msgText">100 brutal levels. One mistake means death. Are you ready?</p>
    <button class="btn" id="startBtn">START (Level 1)</button>
    <button class="btn alt" id="continueBtn" style="display:none;">CONTINUE (Level <span id="contLvl"></span>)</button>
  </div>
</div>

<script>
(function(){
"use strict";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function fitCanvas(){
  const wrapW = window.innerWidth, wrapH = window.innerHeight;
  const scale = Math.min(wrapW/W, wrapH/H, 1.6);
  canvas.style.width = (W*scale)+'px';
  canvas.style.height = (H*scale)+'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

const GRAVITY = 0.62;
const MOVE_SPEED = 4.2;
const JUMP_FORCE = -12.6;
const MAX_FALL = 15;
const TOTAL_LEVELS = 100;
const SAVE_KEY = 'devilrun_progress_v1';

let deathCount = 0;
let currentLevel = 1;
let muted = false;

function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function generateLevel(n){
  const rng = mulberry32(n*7919 + 13);
  const difficulty = Math.min(1, n / TOTAL_LEVELS);
  const segCount = 10 + Math.floor(difficulty * 14);
  const groundY = 480;

  let platforms = [];
  let spikes = [];
  let saws = [];
  let movers = [];
  let fallers = [];
  let disappearing = [];
  let retreaters = [];
  let pushers = [];
  let coins = [];
  let fakeGoal = null;
  let x = 40;
  let y = groundY;

  platforms.push({x:0,y:groundY,w:150,h:60, type:'solid'});
  x = 150;

  const gapMin = 80 + difficulty*55;
  const gapMax = 120 + difficulty*95;
  const plWmin = Math.max(38, 130 - difficulty*88);
  const plWmax = Math.max(55, 190 - difficulty*115);

  for(let i=0;i<segCount;i++){
    const gap = gapMin + rng()*(gapMax-gapMin);
    x += gap;
    const w = plWmin + rng()*(plWmax-plWmin);
    const vary = (rng()-0.5) * (60 + difficulty*160);
    y = Math.max(180, Math.min(groundY, y + vary));

    const roll = rng();
    let type = 'solid';
    if(difficulty > 0.12 && roll < 0.11*difficulty+0.04) type = 'illusion';
    else if(difficulty > 0.18 && roll < 0.22*difficulty+0.05) type = 'disappear';
    else if(difficulty > 0.25 && roll < 0.36*difficulty+0.05) type = 'fall';
    else if(difficulty > 0.12 && roll < 0.58*difficulty+0.10) type = 'move';
    else if(difficulty > 0.40 && roll < 0.68*difficulty+0.05) type = 'retreat';

    const plat = {x, y, w, h:24, type};

    if(type==='move'){
      plat.range = 70 + rng()*150*difficulty + 40;
      plat.speed = 1.2 + rng()*2*difficulty + 0.6;
      plat.phase = rng()*Math.PI*2;
      plat.axis = rng() < 0.6 ? 'x' : 'y';
      plat.baseX = x; plat.baseY = y;
      movers.push(plat);
    } else if(type==='disappear'){
      plat.timer = 40 + rng()*35;
      plat.maxTimer = plat.timer;
      plat.on = true;
      disappearing.push(plat);
    } else if(type==='fall'){
      plat.falling = false;
      plat.fallTimer = 0;
      plat.touched = false;
      fallers.push(plat);
    } else if(type==='retreat'){
      plat.baseX = x;
      plat.offset = 0;
      plat.retreatRange = 70 + rng()*100*difficulty + 40;
      plat.retreatSpeed = 2.4 + rng()*2.2*difficulty;
      retreaters.push(plat);
    }

    if(difficulty > 0.35 && type==='solid' && rng() < 0.10 + 0.14*difficulty){
      const pw = 20;
      pushers.push({x: x + rng()*Math.max(1,(w-pw)), y: y-26, w: pw, h:26});
    }

    platforms.push(plat);

    if(n>1 && rng() < 0.30 + difficulty*0.45 && type==='solid'){
      const sw = Math.min(w*0.5, 30+rng()*30);
      spikes.push({x: x + rng()*(w-sw), y: y-16, w: sw, h:16});
    }

    if(difficulty > 0.15 && rng() < 0.42*difficulty){
      const sx = x - gap*0.5;
      spikes.push({x: sx-15, y: groundY-16, w:30, h:16, floating:true});
    }

    if(difficulty > 0.22 && rng() < 0.34*difficulty){
      saws.push({x: x+w/2, y: y-50-rng()*40, r: 16+rng()*10, angle:0, spin: 0.08+rng()*0.08,
                 bob: rng()<0.5, bobRange: 30+rng()*30, bobSpeed:0.02+rng()*0.02, baseY: y-50-rng()*40, phase: rng()*Math.PI*2});
    }

    if(rng() < 0.4){
      coins.push({x:x+w/2, y:y-40, r:8, taken:false});
    }
  }

  x += gapMin + rng()*gapMax*0.6 + 60;
  const goalY = Math.max(200, y - 20 + (rng()-0.5)*80);

  if(difficulty > 0.3 && rng() < 0.4){
    const fakeGoalX = x - gapMin*0.5;
    const fakeGoalY = Math.max(200, goalY - 20 + (rng()-0.5)*60);
    platforms.push({x: fakeGoalX, y: fakeGoalY, w:170, h:26, type:'solid'});
    fakeGoal = {x: fakeGoalX+70, y: fakeGoalY-46, w:40, h:46, active:true};
  }

  platforms.push({x, y:goalY, w:170, h:26, type:'solid'});

  const goal = {x: x+70, y: goalY-46, w:40, h:46};
  const levelWidth = x + 220;

  return {
    n, difficulty, platforms, spikes, saws, movers, fallers, disappearing,
    retreaters, pushers, coins, goal, fakeGoal,
    levelWidth, groundY,
    start: {x: 40, y: groundY-50}
  };
}

function makePlayer(startX, startY){
  return {
    x:startX, y:startY, w:26, h:34,
    vx:0, vy:0, onGround:false, alive:true,
    facing:1, jumpBuffered:false, coyote:0,
    knockTimer:0,
    trail:[]
  };
}

let level = null;
let player = null;
let camX = 0;
let keys = {left:false,right:false,jump:false};
let particles = [];
let levelStartTime = 0;
let won = false;
let dying = false;
let dyingTimer = 0;
let coinsCollected = 0;

function loadLevel(n){
  level = generateLevel(n);
  player = makePlayer(level.start.x, level.start.y);
  camX = 0;
  won = false;
  dying = false;
  dyingTimer = 0;
  particles = [];
  coinsCollected = 0;
  document.getElementById('levelLabel').textContent = `LEVEL ${n} / ${TOTAL_LEVELS}`;
  levelStartTime = performance.now();
}

function killPlayer(){
  if(dying || won) return;
  dying = true;
  dyingTimer = 0;
  deathCount++;
  document.getElementById('deathCount').textContent = '💀 ' + deathCount;
  for(let i=0;i<18;i++){
    particles.push({
      x:player.x+player.w/2, y:player.y+player.h/2,
      vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8-2,
      life:30+Math.random()*20, color: Math.random()<0.5? '#ff2e63':'#ffd93d'
    });
  }
}

function respawn(){
  player = makePlayer(level.start.x, level.start.y);
  camX = 0;
  dying = false;
}

function winLevel(){
  if(won) return;
  won = true;
  saveProgress(currentLevel+1);
  setTimeout(()=>{
    if(currentLevel >= TOTAL_LEVELS){
      showEndScreen();
    } else {
      currentLevel++;
      loadLevel(currentLevel);
    }
  }, 900);
}

function saveProgress(unlockedLevel){
  try{
    const data = {unlocked: unlockedLevel, deaths: deathCount};
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){}
}
function loadProgress(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw){
      const data = JSON.parse(raw);
      return data;
    }
  }catch(e){}
  return null;
}

window.addEventListener('keydown', e=>{
  if(['ArrowLeft','a','A'].includes(e.key)) keys.left = true;
  if(['ArrowRight','d','D'].includes(e.key)) keys.right = true;
  if(['ArrowUp','w','W',' '].includes(e.key)){ keys.jump = true; e.preventDefault(); }
  if(e.key === 'r' || e.key === 'R') { if(!won) respawn(); }
});
window.addEventListener('keyup', e=>{
  if(['ArrowLeft','a','A'].includes(e.key)) keys.left = false;
  if(['ArrowRight','d','D'].includes(e.key)) keys.right = false;
  if(['ArrowUp','w','W',' '].includes(e.key)) keys.jump = false;
});

function bindHold(el, onDown, onUp){
  el.addEventListener('touchstart', e=>{e.preventDefault(); onDown();}, {passive:false});
  el.addEventListener('touchend', e=>{e.preventDefault(); onUp();}, {passive:false});
  el.addEventListener('mousedown', e=>{e.preventDefault(); onDown();});
  el.addEventListener('mouseup', e=>{e.preventDefault(); onUp();});
  el.addEventListener('mouseleave', ()=>onUp());
}
bindHold(document.getElementById('leftBtn'), ()=>keys.left=true, ()=>keys.left=false);
bindHold(document.getElementById('rightBtn'), ()=>keys.right=true, ()=>keys.right=false);
bindHold(document.getElementById('jumpBtn'), ()=>keys.jump=true, ()=>keys.jump=false);
document.getElementById('restartBtn').addEventListener('click', ()=>{ if(!won) respawn(); });
document.getElementById('muteBtn').addEventListener('click', (e)=>{
  muted = !muted;
  e.target.textContent = muted ? '🔇' : '🔊';
});

function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function updateMovers(){
  const t = performance.now()/1000;
  level.movers.forEach(m=>{
    if(m.axis==='x'){
      m.x = m.baseX + Math.sin(t*m.speed + m.phase) * m.range;
    } else {
      m.y = m.baseY + Math.sin(t*m.speed + m.phase) * m.range;
    }
  });
  level.saws.forEach(s=>{
    s.angle += s.spin;
    if(s.bob){
      s.y = s.baseY + Math.sin(t*s.bobSpeed*10 + s.phase) * s.bobRange;
    }
  });
  level.disappearing.forEach(d=>{
    d.timer -= 1;
    if(d.timer <= 0){
      d.on = !d.on;
      d.timer = d.maxTimer;
    }
  });
  if(player){
    level.retreaters.forEach(p=>{
      const pcx = player.x + player.w/2;
      const platCx = p.baseX + p.offset + p.w/2;
      const vertClose = Math.abs((player.y+player.h) - p.y) < 80;
      const horizClose = Math.abs(pcx - platCx) < 150;
      p._prevX = p.x;
      if(vertClose && horizClose){
        const dir = pcx < platCx ? 1 : -1;
        p.offset += dir * p.retreatSpeed;
        p.offset = Math.max(-p.retreatRange, Math.min(p.retreatRange, p.offset));
      } else {
        p.offset *= 0.93;
        if(Math.abs(p.offset) < 0.5) p.offset = 0;
      }
      p.x = p.baseX + p.offset;
    });
  }
}

function updatePlayer(dt){
  if(dying){
    dyingTimer++;
    if(dyingTimer > 40) respawn();
    return;
  }
  if(won) return;

  if(player.knockTimer > 0){
    player.knockTimer--;
    player.vx *= 0.95;
  } else if(keys.left && !keys.right){ player.vx = -MOVE_SPEED; player.facing=-1; }
  else if(keys.right && !keys.left){ player.vx = MOVE_SPEED; player.facing=1; }
  else { player.vx *= 0.7; if(Math.abs(player.vx)<0.05) player.vx=0; }

  player.vy += GRAVITY;
  if(player.vy > MAX_FALL) player.vy = MAX_FALL;

  if(player.onGround) player.coyote = 8;
  else if(player.coyote>0) player.coyote--;

  if(keys.jump && player.coyote>0 && player.knockTimer<=0){
    player.vy = JUMP_FORCE;
    player.coyote = 0;
    player.onGround = false;
    for(let i=0;i<6;i++){
      particles.push({x:player.x+player.w/2,y:player.y+player.h, vx:(Math.random()-0.5)*3, vy:Math.random()*-1, life:14, color:'#ffffffaa'});
    }
  }

  player.x += player.vx;
  player.onGround = false;

  const solidRects = level.platforms.filter(p =>
    p.type !== 'illusion' &&
    !(p.type==='fall' && p.falling) &&
    !(p.type==='disappear' && !p.on)
  );

  for(const p of solidRects){
    if(rectsOverlap(player, p)){
      if(player.vx > 0) player.x = p.x - player.w;
      else if(player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  player.y += player.vy;
  for(const p of solidRects){
    if(rectsOverlap(player, p)){
      if(player.vy > 0){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        if(p.type==='fall'){
          if(!p.touched){ p.touched = true; p.fallTimer = Math.max(10, 25 - level.difficulty*14); }
        }
        if(p.type==='move' || p.type==='retreat'){
          player._ridingMover = p;
        }
      } else if(player.vy < 0){
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  if(player.onGround && player._ridingMover){
    const m = player._ridingMover;
    if(m._prevX !== undefined) player.x += (m.x - m._prevX);
    if(m._prevY !== undefined) player.y += (m.y - m._prevY);
  }
  level.movers.forEach(m=>{ m._prevX = m.x; m._prevY = m.y; });
  if(!player.onGround) player._ridingMover = null;

  level.fallers.forEach(p=>{
    if(p.touched && !p.falling){
      p.fallTimer--;
      if(p.fallTimer<=0){ p.falling = true; p.vy = 0; }
    }
    if(p.falling){
      p.vy = (p.vy||0) + GRAVITY;
      p.y += p.vy;
    }
  });

  if(player.y > level.groundY + 300){
    killPlayer();
    return;
  }
  if(player.x < 0) player.x = 0;

  const hitbox = {x:player.x+6, y:player.y+6, w:player.w-12, h:player.h-8};
  for(const s of level.spikes){
    if(rectsOverlap(hitbox, s)){ killPlayer(); return; }
  }
  for(const s of level.saws){
    const cx = player.x+player.w/2, cy = player.y+player.h/2;
    const dx = cx-s.x, dy = cy-s.y;
    if(Math.sqrt(dx*dx+dy*dy) < s.r + 10){ killPlayer(); return; }
  }

  for(const s of level.pushers){
    if(rectsOverlap(hitbox, s)){ killPlayer(); return; }
  }

  level.coins.forEach(c=>{
    if(!c.taken){
      const cx=player.x+player.w/2, cy=player.y+player.h/2;
      const dx=cx-c.x, dy=cy-c.y;
      if(Math.sqrt(dx*dx+dy*dy) < c.r+16){ c.taken=true; coinsCollected++; }
    }
  });

  if(level.fakeGoal && level.fakeGoal.active && rectsOverlap(player, level.fakeGoal)){
    level.fakeGoal.active = false;
    for(let i=0;i<14;i++){
      particles.push({x:player.x+player.w/2,y:player.y+player.h/2, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-2, life:20+Math.random()*10, color:'#c86bff'});
    }
  } else if(rectsOverlap(player, level.goal)){
    winLevel();
  }

  const targetCam = Math.max(0, player.x - W*0.4);
  camX += (targetCam - camX) * 0.12;

  player.trail.push({x:player.x, y:player.y});
  if(player.trail.length>6) player.trail.shift();

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; });
  particles = particles.filter(p=>p.life>0);
}

function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#ffffff';
  const cloudOffset = -(camX*0.25);
  for(let i=0;i<10;i++){
    const cx = ((i*260 + cloudOffset) % (W+400)) - 200;
    const cy = 50 + (i%3)*70;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 34, 18, 0, 0, Math.PI*2);
    ctx.ellipse(cx+26, cy+6, 26, 14, 0, 0, Math.PI*2);
    ctx.ellipse(cx-26, cy+6, 26, 14, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(-camX, 0);

  ctx.fillStyle = '#3a2313';
  ctx.fillRect(camX-50, level.groundY+60, W+100, 400);

  level.platforms.forEach(p=>{
    if(p.type==='disappear' && !p.on){
      ctx.strokeStyle = '#ffffff33';
      ctx.setLineDash([6,6]);
      ctx.strokeRect(p.x,p.y,p.w,p.h);
      ctx.setLineDash([]);
      return;
    }
    let grad = ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    if(p.type==='move'){
      grad.addColorStop(0,'#c1440e'); grad.addColorStop(1,'#7a2a08');
    } else if(p.type==='retreat'){
      grad.addColorStop(0,'#ffb347'); grad.addColorStop(1,'#a85c00');
    } else if(p.type==='fall'){
      grad.addColorStop(0, p.touched? '#ff8c42':'#c97b3d'); grad.addColorStop(1,'#5a3418');
    } else if(p.type==='disappear'){
      grad.addColorStop(0,'#c86bff'); grad.addColorStop(1,'#5a1b8a');
    } else {
      grad.addColorStop(0,'#8B5A2B'); grad.addColorStop(1,'#5C3A1E');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(p.x,p.y,p.w,p.h);
    if(p.type==='solid' || p.type==='illusion'){
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(p.x, p.y, p.w, 6);
    }
    if(p.type==='move'){
      ctx.strokeStyle = '#00000055';
      ctx.lineWidth = 1;
      const brickH = 8, brickW = 26;
      let rowIdx = 0;
      for(let by=p.y; by<p.y+p.h; by+=brickH){
        ctx.beginPath(); ctx.moveTo(p.x, by); ctx.lineTo(p.x+p.w, by); ctx.stroke();
        const offset = (rowIdx%2===0) ? 0 : brickW/2;
        for(let bx=p.x+offset; bx<p.x+p.w; bx+=brickW){
          ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, Math.min(by+brickH, p.y+p.h)); ctx.stroke();
        }
        rowIdx++;
      }
    }
    ctx.strokeStyle = '#00000033';
    ctx.strokeRect(p.x,p.y,p.w,p.h);
  });

  level.pushers.forEach(s=>{
    ctx.fillStyle = '#ff6b1a';
    ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.strokeStyle = '#8a3600';
    ctx.strokeRect(s.x, s.y, s.w, s.h);
    ctx.fillStyle = '#ffd93d';
    ctx.beginPath();
    ctx.moveTo(s.x+s.w*0.2, s.y+s.h/2);
    ctx.lineTo(s.x+s.w*0.75, s.y+s.h*0.3);
    ctx.lineTo(s.x+s.w*0.75, s.y+s.h*0.7);
    ctx.closePath();
    ctx.fill();
  });

  ctx.fillStyle = '#e8e8e8';
  level.spikes.forEach(s=>{
    const teeth = Math.max(1, Math.round(s.w/15));
    const tw = s.w/teeth;
    for(let i=0;i<teeth;i++){
      ctx.beginPath();
      ctx.moveTo(s.x+i*tw, s.y+s.h);
      ctx.lineTo(s.x+i*tw+tw/2, s.y);
      ctx.lineTo(s.x+i*tw+tw, s.y+s.h);
      ctx.closePath();
      ctx.fillStyle = '#dcdcdc';
      ctx.fill();
      ctx.strokeStyle='#ff2e6377';
      ctx.stroke();
    }
  });

  level.saws.forEach(s=>{
    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.rotate(s.angle);
    ctx.fillStyle = '#c0c0c0';
    ctx.beginPath();
    const teeth=10;
    for(let i=0;i<teeth;i++){
      const a1 = (i/teeth)*Math.PI*2;
      const a2 = ((i+0.5)/teeth)*Math.PI*2;
      ctx.lineTo(Math.cos(a1)*s.r, Math.sin(a1)*s.r);
      ctx.lineTo(Math.cos(a2)*(s.r+8), Math.sin(a2)*(s.r+8));
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#6b6b6b';
    ctx.beginPath(); ctx.arc(0,0,s.r*0.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  level.coins.forEach(c=>{
    if(c.taken) return;
    ctx.save();
    ctx.translate(c.x,c.y);
    ctx.fillStyle='#ffd93d';
    ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c99700'; ctx.stroke();
    ctx.restore();
  });

  const pulse = 1+Math.sin(performance.now()/200)*0.05;
  if(level.fakeGoal && level.fakeGoal.active){
    const fg = level.fakeGoal;
    ctx.save();
    ctx.translate(fg.x+fg.w/2, fg.y+fg.h);
    ctx.scale(pulse,pulse);
    ctx.fillStyle = '#08d9d6';
    ctx.fillRect(-fg.w/2,-fg.h,fg.w,fg.h);
    ctx.strokeStyle='#fff'; ctx.strokeRect(-fg.w/2,-fg.h,fg.w,fg.h);
    ctx.fillStyle='#fff';
    ctx.font='bold 14px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('GOAL', 0, -fg.h/2+5);
    ctx.restore();
  }

  const g = level.goal;
  ctx.save();
  ctx.translate(g.x+g.w/2, g.y+g.h);
  ctx.scale(pulse,pulse);
  ctx.fillStyle = '#08d9d6';
  ctx.fillRect(-g.w/2,-g.h,g.w,g.h);
  ctx.strokeStyle='#fff'; ctx.strokeRect(-g.w/2,-g.h,g.w,g.h);
  ctx.fillStyle='#fff';
  ctx.font='bold 14px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('GOAL', 0, -g.h/2+5);
  ctx.restore();

  player.trail.forEach((t,i)=>{
    ctx.globalAlpha = (i/player.trail.length)*0.18;
    ctx.fillStyle = '#ff2e63';
    ctx.beginPath();
    ctx.ellipse(t.x+player.w/2, t.y+player.h/2, player.w/2, player.h/2, 0, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if(!dying || dyingTimer%6<3){
    ctx.save();
    ctx.translate(player.x+player.w/2, player.y+player.h/2);
    if(player.facing<0) ctx.scale(-1,1);

    const running = Math.abs(player.vx) > 0.3 && player.onGround;
    const walkT = performance.now()/90;
    const swing = running ? Math.sin(walkT)*16 : (player.onGround? 0 : -8);
    const swing2 = running ? Math.sin(walkT+Math.PI)*16 : (player.onGround? 0 : 10);

    const skin = '#ffcf9e';
    const shirt = '#ff2e63';
    const pants = '#2b2b52';

    ctx.strokeStyle = pants; ctx.lineWidth = 6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-3, 2); ctx.lineTo(-3+swing2*0.3, 15+Math.abs(swing2*0.15)); ctx.stroke();
    ctx.strokeStyle = skin; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(-6,-9); ctx.lineTo(-6+swing2*0.4, 2+Math.abs(swing2*0.1)); ctx.stroke();

    ctx.fillStyle = shirt;
    ctx.beginPath();
    ctx.moveTo(-8,-13);
    ctx.lineTo(8,-13);
    ctx.lineTo(6,4);
    ctx.lineTo(-6,4);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = pants; ctx.lineWidth = 6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(3, 2); ctx.lineTo(3+swing*0.3, 15+Math.abs(swing*0.15)); ctx.stroke();
    ctx.strokeStyle='#3a2313'; ctx.lineWidth=6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-3+swing2*0.3,15+Math.abs(swing2*0.15)); ctx.lineTo(-3+swing2*0.3+3,15+Math.abs(swing2*0.15)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3+swing*0.3,15+Math.abs(swing*0.15)); ctx.lineTo(3+swing*0.3+3,15+Math.abs(swing*0.15)); ctx.stroke();

    ctx.strokeStyle = skin; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(6,-9); ctx.lineTo(6+swing*0.4, 2+Math.abs(swing*0.1)); ctx.stroke();

    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(0,-19,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a2313';
    ctx.beginPath(); ctx.arc(0,-22,8,Math.PI,Math.PI*2); ctx.fill();
    ctx.fillRect(-8,-24,16,4);
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(4,-19,1.6,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  particles.forEach(p=>{
    ctx.globalAlpha = Math.max(0,p.life/40);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x,p.y,4,4);
  });
  ctx.globalAlpha=1;

  ctx.restore();

  if(won){
    ctx.fillStyle='#00000088';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd93d';
    ctx.textAlign='center';
    ctx.font='bold 40px sans-serif';
    ctx.fillText('LEVEL CLEAR!', W/2, H/2);
  }
}

function loop(){
  updateMovers();
  updatePlayer();
  draw();
  requestAnimationFrame(loop);
}

function showEndScreen(){
  const overlay = document.getElementById('msgOverlay');
  document.getElementById('msgTitle').textContent = 'YOU WIN! 🏆';
  document.getElementById('msgText').textContent = `You beat all 100 levels! Total deaths: ${deathCount}. You are a true Devil Master!`;
  document.getElementById('startBtn').textContent = 'PLAY AGAIN FROM LEVEL 1';
  document.getElementById('continueBtn').style.display='none';
  overlay.classList.remove('hidden');
}

const overlay = document.getElementById('msgOverlay');
const startBtn = document.getElementById('startBtn');
const continueBtn = document.getElementById('continueBtn');

const progress = loadProgress();
if(progress && progress.unlocked > 1){
  continueBtn.style.display='inline-block';
  document.getElementById('contLvl').textContent = Math.min(progress.unlocked, TOTAL_LEVELS);
  deathCount = progress.deaths || 0;
  document.getElementById('deathCount').textContent = '💀 ' + deathCount;
}

startBtn.addEventListener('click', ()=>{
  currentLevel = 1;
  overlay.classList.add('hidden');
  loadLevel(currentLevel);
});
continueBtn.addEventListener('click', ()=>{
  currentLevel = Math.min(progress.unlocked, TOTAL_LEVELS);
  overlay.classList.add('hidden');
  loadLevel(currentLevel);
});

loadLevel(1);
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
